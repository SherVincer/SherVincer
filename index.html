<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SherVincer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
:root{
    --bg:#050505;
    --primary:#67B36F;
    --primary-glow:#8CE296;
    --text:#ffffff;
    --muted:#9ca3af;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Inter, sans-serif;
    background:var(--bg);
    color:var(--text);
    width:100vw;
    height:100vh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}
body::before{
    content:'';
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;
    background:radial-gradient(circle, var(--primary), transparent 70%);
    filter:blur(120px);
    opacity:.18;
    z-index:0;
}

.bg-logo{
    position:fixed;
    width:280px;
    z-index:1;
    left: 50%;
    top: 50%;
    transform: translate(-45%, -50%);
    animation:intro 2.2s cubic-bezier(.16,1,.3,1) forwards;
}

.card{
    position:relative;
    z-index:2;
    width:min(420px,92vw);
    padding:32px;
    border:1px solid rgba(103,179,111,.25);
    background:rgba(255,255,255,.03);
    backdrop-filter:blur(18px);
    border-radius:28px;
    text-align:center;
    box-shadow:0 0 40px rgba(103,179,111,.12);
    opacity:0;
    animation:showCard .8s ease forwards;
    animation-delay:2.1s;
}

.dot{
    width:10px;
    height:10px;
    background:var(--primary);
    border-radius:50%;
    display:inline-block;
    box-shadow:0 0 15px var(--primary);
    margin-bottom:14px;
}

.logo{
    font-size:2.4rem;
    font-weight:800;
    letter-spacing:4px;
    color:var(--primary);
}

.subtitle{
    margin-top:10px;
    color:var(--muted);
    line-height:1.6;
}

.status{
    color:var(--primary);
    margin-top:14px;
    font-size:.95rem;
    font-weight:600;
}

.links{
    margin-top:28px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

.link{
    text-decoration:none;
    color:white;
    padding:15px;
    border-radius:14px;
    border:1px solid rgba(103,179,111,.2);
    background:rgba(255,255,255,.02);
    transition:.25s;
    cursor:pointer;
}

.link:hover{
    transform:translateY(-2px);
    border-color:var(--primary);
    box-shadow:0 0 22px rgba(140,226,150,0.55);
    background:rgba(103,179,111,0.1);
}

/* Toast notification */
.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    background:rgba(103,179,111,0.95);
    color:white;
    padding:12px 24px;
    border-radius:12px;
    font-size:0.95rem;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
    opacity:0;
    transition:opacity 0.3s ease;
    z-index:100;
    pointer-events:none;
}
.toast.show{
    opacity:1;
}

.footer{
    margin-top:20px;
    font-size:.85rem;
    color:#7f7f7f;
}

@keyframes intro{
    0%{
        transform: translate(-45%, -50%) scale(.6);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    100%{
        transform: translate(-45%, -50%) scale(7);
        opacity:.05;
    }
}

@keyframes showCard{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<img src="logo.png" class="bg-logo">

<div class="card">
<div class="dot"></div>
<div class="logo">SHERVINCER</div>

<div class="subtitle">
Creator • Producer • Developer<br>
Создаю музыку, цифровой контент и собственные проекты.
</div>

<div class="status">OPEN FOR COLLABORATION</div>

<div class="links">
<a class="link" href="https://t.me/SherVincerTV">Telegram</a>
<a class="link" href="https://discord.gg/ptPwStA877">Discord</a>
<a class="link" id="emailLink">Email</a>
</div>

<div class="footer">
Для связи и деловых предложений
</div>
</div>

<!-- Toast notification -->
<div id="toast" class="toast">✓ Email скопирован в буфер обмена</div>

<script>
// Email copy to clipboard + toast notification
const emailLink = document.getElementById('emailLink');
const toast = document.getElementById('toast');
const email = 'sharickgoo@gmail.com';

emailLink.addEventListener('click', function(e) {
    e.preventDefault();

    navigator.clipboard.writeText(email).then(function() {
        showToast();
    }).catch(function() {
        // Fallback for older browsers
        const textarea = document.createElement('textarea');
        textarea.value = email;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand('copy');
        document.body.removeChild(textarea);
        showToast();
    });
});

function showToast() {
    toast.classList.add('show');
    setTimeout(function() {
        toast.classList.remove('show');
    }, 2500);
}
</script>

</body>
</html>
